<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0F1A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ExoTerra — Prototipo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg: #0A0F1A;
    --panel: #101827;
    --panel-border: #1E2A3F;
    --cyan: #29E6E0;
    --cyan-dim: rgba(41,230,224,0.35);
    --gold: #F5B93F;
    --violet: #8B6BFF;
    --violet-dim: rgba(139,107,255,0.35);
    --leaf: #34D399;
    --leaf-dim: rgba(52,211,153,0.35);
    --text: #E8EEF7;
    --text-dim: #8595AD;
    --danger: #FF6B6B;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;height:100dvh;margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
  }

  #app{
    position:relative;
    width:100%;
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
  }

  /* ---------- HEADER ---------- */
  header{
    z-index:1000;
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 14px;
    background:linear-gradient(180deg, rgba(10,15,26,0.97), rgba(10,15,26,0.85));
    border-bottom:1px solid var(--panel-border);
    backdrop-filter:blur(6px);
  }

  #incomeBar{
    flex-shrink:0;
    height:4px;
    width:100%;
    background:var(--panel-border);
    position:relative;
    overflow:hidden;
  }
  #incomeBarFill{
    position:absolute; left:0; top:0; bottom:0;
    width:0%;
    background:linear-gradient(90deg, var(--gold), var(--cyan));
    transition:width .3s linear;
  }

  .avatar{
    width:42px;height:42px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #3a4a63, #0d1420);
    border:2px solid var(--cyan);
    box-shadow:0 0 10px var(--cyan-dim);
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;font-size:16px;color:var(--cyan);
    flex-shrink:0;
    background-size:cover;
    background-position:center;
    cursor:pointer;
  }
  .avatar:active{ opacity:0.8; }

  .id-block{display:flex;flex-direction:column;line-height:1.2;flex:1;min-width:0;}
  .id-block .name{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;
    outline:none; cursor:text; max-width:100%;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    border-bottom:1px dashed transparent;
  }
  .id-block .name:focus{ border-bottom-color:var(--cyan); overflow:visible; white-space:normal; }
  .id-block .status{font-size:11px;color:var(--text-dim);}
  .status.locating{color:var(--gold);}
  .status.ready{color:var(--cyan);}
  .status.warn{color:var(--danger);}

  .stat{
    display:flex;align-items:center;gap:5px;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:20px;
    padding:6px 12px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;font-size:13px;
    white-space:nowrap;
  }
  .stat.coins{color:var(--gold);}
  .stat.gems{color:var(--cyan);}
  .stat .icon{font-size:13px;}

  /* ---------- MAP ---------- */
  #mapWrap{
    flex:1;
    min-height:0;
    position:relative;
    overflow:hidden;
    perspective:1000px;
    background:var(--bg);
  }
  #map{
    position:absolute;
    left:-25%; top:-80%;
    width:150%;
    height:250%;
    background:#0A0F1A;
    transform-origin:50% 100%;
    transform:rotateX(32deg) scale(1.9);
  }
  .leaflet-container{background:#0A0F1A;}

  .cell-owned{filter:drop-shadow(0 0 4px var(--leaf));}
  .cell-locked:hover{cursor:pointer;}

  .diamond-icon{cursor:pointer;}
  .gem-wrap{
    position:relative; width:34px; height:44px;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .gem-shadow{
    position:absolute; bottom:2px; left:50%; transform:translateX(-50%);
    width:20px; height:7px; border-radius:50%;
    background:rgba(0,0,0,0.45);
    filter:blur(1.5px);
    animation:gemShadowPulse 1.8s ease-in-out infinite;
  }
  .gem-body{
    position:relative;
    width:24px; height:24px;
    margin-bottom:14px;
    background:linear-gradient(135deg, #eafffe 0%, #6FF3EF 35%, #29E6E0 65%, #0c8f8c 100%);
    clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
    filter: drop-shadow(0 6px 5px rgba(0,0,0,0.4)) drop-shadow(0 0 9px rgba(41,230,224,0.85));
    animation: gemFloat 2s ease-in-out infinite;
  }
  .gem-body::after{
    content:''; position:absolute; top:15%; left:38%;
    width:8px; height:8px;
    background:rgba(255,255,255,0.85);
    clip-path: polygon(50% 0%, 100% 40%, 60% 100%, 0% 55%);
  }
  @keyframes gemFloat{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-8px); }
  }
  @keyframes gemShadowPulse{
    0%,100%{ transform:translateX(-50%) scale(1); opacity:0.45; }
    50%{ transform:translateX(-50%) scale(0.7); opacity:0.25; }
  }

  .user-wrap{
    position:relative; width:44px; height:76px;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .user-shadow{
    position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:24px; height:8px; border-radius:50%;
    background:rgba(0,0,0,0.4);
    filter:blur(1.5px);
  }
  #astroCanvas{
    width:44px; height:68px;
    margin-bottom:2px;
    filter: drop-shadow(0 6px 5px rgba(0,0,0,0.35));
  }

  /* ---------- TOAST ---------- */
  #toast{
    position:absolute;
    top:70px;left:50%;
    transform:translateX(-50%) translateY(-10px);
    background:var(--panel);
    border:1px solid var(--panel-border);
    padding:8px 16px;
    border-radius:10px;
    font-size:13px;
    font-weight:500;
    z-index:2000;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #toast.ok{border-color:var(--cyan);color:var(--cyan);}
  #toast.warn{border-color:var(--danger);color:var(--danger);}
  #toast.gold{border-color:var(--gold);color:var(--gold);}

  /* ---------- BOTTOM SHEET ---------- */
  #sheet{
    z-index:1000;
    flex-shrink:0;
    background:var(--panel);
    border-top:1px solid var(--panel-border);
    padding:12px 16px 16px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  #sheet .row{display:flex;justify-content:space-between;align-items:center;}
  #sheet .title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--text-dim);letter-spacing:0.02em;text-transform:uppercase;}
  #sheet .hint{font-size:12px;color:var(--text-dim);}

  .legend{display:flex;gap:14px;font-size:11px;color:var(--text-dim);flex-wrap:wrap;}
  .legend span{display:flex;align-items:center;gap:5px;}
  .swatch{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .sw-locked{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.25);}
  .sw-owned{background:var(--leaf-dim);border:1px solid var(--leaf);}

  /* ---------- FLOATING BUTTONS ---------- */
  .recenter-btn{
    position:absolute; right:10px; bottom:120px; z-index:1000;
    width:40px;height:40px;border-radius:50%;
    background:var(--panel); border:1px solid var(--panel-border);
    color:var(--cyan); font-size:18px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .fullscreen-btn{
    position:absolute; right:10px; bottom:170px; z-index:1000;
    width:40px;height:40px;border-radius:50%;
    background:var(--panel); border:1px solid var(--panel-border);
    color:var(--cyan); font-size:16px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }

  /* ---------- CONFIRM MODAL ---------- */
  .modal{
    position:absolute; inset:0; z-index:3000;
    background:rgba(5,8,14,0.6);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition:opacity .18s ease;
  }
  .modal.show{opacity:1; pointer-events:auto;}
  .modal-card{
    width:min(300px, 84%);
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:14px;
    padding:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
  }
  .modal-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;margin-bottom:6px;}
  .modal-msg{font-size:13px;color:var(--text-dim);line-height:1.4;margin-bottom:16px;}
  .modal-actions{display:flex;gap:10px;}
  .modal-actions button{
    flex:1;
    padding:9px 0;
    border-radius:8px;
    border:1px solid var(--panel-border);
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
  .btn-no{background:transparent;color:var(--text-dim);}
  .btn-yes{background:var(--violet);color:#fff;border-color:var(--violet);}
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="avatar" id="avatar" title="Toca para cambiar tu foto">JD</div>
    <input type="file" id="avatarInput" accept="image/*" style="display:none">
    <div class="id-block">
      <div class="name" id="userName" contenteditable="true" spellcheck="false" title="Toca para editar tu nombre">Jugador</div>
      <div class="status locating" id="geoStatus">Buscando ubicación…</div>
    </div>
    <div class="stat coins"><span class="icon">🪙</span><span id="coinCount">200</span></div>
    <div class="stat gems"><span class="icon">💎</span><span id="gemCount">0</span></div>
  </header>
  <div id="incomeBar"><div id="incomeBarFill"></div></div>

  <div id="mapWrap">
    <div id="map"></div>
    <button class="recenter-btn" id="recenterBtn" title="Centrar en mi ubicación">🎯</button>
    <button class="fullscreen-btn" id="fullscreenBtn" title="Pantalla completa">⛶</button>
    <button class="fullscreen-btn" id="compassBtn" title="Reiniciar giro del mapa" style="bottom:220px;">🧭</button>
    <div id="toast"></div>
  </div>

  <div id="confirmModal" class="modal">
    <div class="modal-card">
      <div class="modal-title" id="confirmTitle">Confirmar compra</div>
      <div class="modal-msg" id="confirmMsg">¿Comprar esta celda?</div>
      <div class="modal-actions">
        <button class="btn-no" id="confirmNo">Cancelar</button>
        <button class="btn-yes" id="confirmYes">Comprar</button>
      </div>
    </div>
  </div>

  <div id="sheet">
    <div class="row">
      <span class="title">ExoTerra</span>
      <span class="hint" id="cellHint">Radio de acción: 25m</span>
    </div>
    <div class="legend">
      <span><i class="swatch sw-locked"></i>Libre — toca para comprar</span>
      <span><i class="swatch sw-owned"></i>Tuya</span>
      <span>💎 Diamante — acércate y tócalo</span>
    </div>
    <div class="row" id="baseBar" style="display:none;background:rgba(245,185,63,0.1);border:1px solid var(--gold);border-radius:10px;padding:8px 10px;">
      <span style="font-size:12px;color:var(--gold);font-weight:600;">🏠 Tienes un bloque 3x3 listo</span>
      <button id="buildBaseBtn" style="background:var(--gold);color:#1a1200;border:none;border-radius:8px;padding:6px 12px;font-weight:700;font-size:12px;cursor:pointer;">Construir (50 🪙)</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet-src.js"></script>
<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  window.addEventListener('error', (e)=>{
    console.error('Error capturado:', e.error || e.message);
  });

  // ---------- CONFIG ----------
  const CELL_METERS = 5;
  const CELL_COST = 10;
  const DIAMOND_REWARD_COINS = 5;
  const ACTION_RADIUS_M = 25;
  const TARGET_SCREEN_METERS = ACTION_RADIUS_M*2 + CELL_METERS*2*3; // radio de acción + 3 celdas de margen por lado (1 base + 2 extra por la inclinación)
  const COLLECT_RADIUS_M = ACTION_RADIUS_M;
  const DIAMOND_MIN = 2;
  const DIAMOND_MAX = 6;
  const BASE_BLOCK = 3;
  const BASE_COST = 50;
  const GRID_MIN_ZOOM = 17;

  // ---------- STATE ----------
  let state = {
    coins: 200,
    gems: 0,
    ownedCells: new Set(),
    bases: new Set(),
    diamonds: new Map(),
    userPos: null,
    latStep: null,
    lngStep: null,
    ready: false,
    username: 'Jugador',
    avatarData: null
  };

  const SAVE_KEY = 'exoterra_save_v1';

  function saveProgress(){
    try{
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        coins: state.coins,
        gems: state.gems,
        ownedCells: [...state.ownedCells],
        bases: [...state.bases],
        username: state.username,
        avatarData: state.avatarData
      }));
    }catch(e){ console.warn('No se pudo guardar el progreso:', e); }
  }

  function loadProgress(){
    try{
      const raw = localStorage.getItem(SAVE_KEY);
      if(!raw) return;
      const d = JSON.parse(raw);
      state.coins = typeof d.coins === 'number' ? d.coins : state.coins;
      state.gems = typeof d.gems === 'number' ? d.gems : state.gems;
      state.ownedCells = new Set(d.ownedCells || []);
      state.bases = new Set(d.bases || []);
      state.username = d.username || state.username;
      state.avatarData = d.avatarData || null;
    }catch(e){ console.warn('No se pudo cargar el progreso:', e); }
  }
  loadProgress(); // restaura monedas, diamantes, celdas, base, nombre y foto guardados

  const toastEl = document.getElementById('toast');
  function toast(msg, type){
    toastEl.textContent = msg;
    toastEl.className = 'show ' + (type || '');
    clearTimeout(toast._t);
    toast._t = setTimeout(()=> toastEl.className = '', 1800);
  }

  function updateHUD(){
    document.getElementById('coinCount').textContent = state.coins.toFixed(5);
    document.getElementById('gemCount').textContent = state.gems;
    const frac = state.coins - Math.floor(state.coins);
    const fill = document.getElementById('incomeBarFill');
    if(fill) fill.style.width = (frac*100).toFixed(3) + '%';
  }

  // ---------- INGRESO PASIVO ----------
  const PASSIVE_COIN_RATE = 0.000005; // monedas por segundo
  let sinceLastSave = 0;
  setInterval(()=>{
    const income = PASSIVE_COIN_RATE * state.ownedCells.size;
    if(income > 0) state.coins += income;
    updateHUD();
    sinceLastSave++;
    if(sinceLastSave >= 10){ saveProgress(); sinceLastSave = 0; } // guarda cada ~10s, no en cada tick
  }, 1000);

  // ---------- MAP INIT ----------
  const map = L.map('map', {
    zoomControl:false,
    attributionControl:false,
    zoomSnap:0,
    zoomDelta:0.25,
    maxZoom:22,
    minZoom:14,
    dragging:true,
    scrollWheelZoom:false,
    doubleClickZoom:false,
    touchZoom:false,
    boxZoom:false,
    keyboard:false,
    rotate:true,
    rotateControl:false,
    touchRotate:true,
    bearing:0
  }).setView([19.4326, -99.1332], 20);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:21, maxNativeZoom:19 }).addTo(map);

  const cellLayer = L.layerGroup().addTo(map);
  const baseLayer = L.layerGroup().addTo(map);
  const diamondLayer = L.layerGroup().addTo(map);
  let meMarker = null;
  let actionCircle = null;
  let lastPos = null;
  let heading = 0;
  const cellRects = new Map();

  let FIXED_ZOOM = 20;

  function computeFixedZoom(lat){
    const screenWidthPx = document.getElementById('mapWrap').clientWidth || window.innerWidth || 360;
    const metersPerPixel = TARGET_SCREEN_METERS / screenWidthPx;
    const z = Math.log2(156543.03392 * Math.cos(lat*Math.PI/180) / metersPerPixel);
    return Math.min(22, Math.max(14, z));
  }

  function lockZoomForUser(lat){
    FIXED_ZOOM = computeFixedZoom(lat);
    map.setMinZoom(FIXED_ZOOM);
    map.setMaxZoom(FIXED_ZOOM);
  }

  function setViewTilted(latlng, zoom, animate){
    // Coloca al usuario centrado horizontalmente y a 2/5 de la pantalla desde abajo (compensando la inclinación 3D)
    const h = document.getElementById('mapWrap').clientHeight || 500;
    const offsetPx = h * 0.42;
    const targetPoint = map.project(latlng, zoom).subtract(L.point(0, offsetPx));
    const shifted = map.unproject(targetPoint, zoom);
    if(animate){
      map.setView(shifted, zoom, { animate:true, duration:0.5, easeLinearity:0.4 });
    } else {
      map.setView(shifted, zoom);
    }
  }

  function bearingDeg(a,b){
    const φ1=a.lat*Math.PI/180, φ2=b.lat*Math.PI/180;
    const Δλ=(b.lng-a.lng)*Math.PI/180;
    const y=Math.sin(Δλ)*Math.cos(φ2);
    const x=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
    return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
  }

  function metersToStep(lat){
    const latStep = CELL_METERS / 111320;
    const lngStep = CELL_METERS / (111320 * Math.cos(lat * Math.PI/180));
    return { latStep, lngStep };
  }

  function cellBounds(i,j){
    const lat0 = i * state.latStep, lat1 = (i+1)*state.latStep;
    const lng0 = j * state.lngStep, lng1 = (j+1)*state.lngStep;
    return [[lat0,lng0],[lat1,lng1]];
  }

  function distMeters(a,b){
    const R=6371000;
    const dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
    const s=Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.sqrt(s));
  }

  function renderGrid(){
    if(!state.latStep) return;
    cellLayer.clearLayers();
    cellRects.clear();
    if(map.getZoom() < GRID_MIN_ZOOM) return;

    const bounds = map.getBounds().pad(0.3);
    const iMin = Math.floor(bounds.getSouth() / state.latStep);
    const iMax = Math.floor(bounds.getNorth() / state.latStep);
    const jMin = Math.floor(bounds.getWest() / state.lngStep);
    const jMax = Math.floor(bounds.getEast() / state.lngStep);

    for(let i=iMin; i<=iMax; i++){
      for(let j=jMin; j<=jMax; j++){
        const id = i+'_'+j;
        const owned = state.ownedCells.has(id);
        const rect = L.rectangle(cellBounds(i,j), {
          color: owned ? '#34D399' : 'rgba(255,255,255,0.28)',
          weight: owned ? 2 : 1,
          fillColor: owned ? '#34D399' : '#ffffff',
          fillOpacity: owned ? 0.28 : 0.03,
          className: owned ? 'cell-owned' : 'cell-locked'
        }).addTo(cellLayer);
        rect.on('click', ()=> tryBuyCell(id, i, j));
        cellRects.set(id, rect);
      }
    }
  }
  map.on('moveend zoomend', renderGrid);

  function findEligibleBaseBlock(){
    for(const id of state.ownedCells){
      const [i,j] = id.split('_').map(Number);
      let complete = true;
      for(let di=0; di<BASE_BLOCK && complete; di++){
        for(let dj=0; dj<BASE_BLOCK && complete; dj++){
          if(!state.ownedCells.has((i+di)+'_'+(j+dj))) complete = false;
        }
      }
      if(complete && !state.bases.has(id)) return {i,j,id};
    }
    return null;
  }

  const baseRenderers = {}; // canvasId -> {renderer, raf}

  function renderBases(){
    Object.values(baseRenderers).forEach(r=>{
      cancelAnimationFrame(r.raf);
      r.renderer.dispose();
    });
    for(const k in baseRenderers) delete baseRenderers[k];

    baseLayer.clearLayers();
    let idx = 0;
    for(const key of state.bases){
      const [i,j] = key.split('_').map(Number);
      const b0 = cellBounds(i,j), b1 = cellBounds(i+BASE_BLOCK-1, j+BASE_BLOCK-1);
      const blockBounds = [[b0[0][0], b0[0][1]], [b1[1][0], b1[1][1]]];
      L.rectangle(blockBounds, { color:'#F5B93F', weight:2, fillColor:'#F5B93F', fillOpacity:0.12 }).addTo(baseLayer);
      const centerLat = (blockBounds[0][0]+blockBounds[1][0])/2;
      const centerLng = (blockBounds[0][1]+blockBounds[1][1])/2;

      const cornerA = map.latLngToContainerPoint(L.latLng(blockBounds[0][0], blockBounds[0][1]));
      const cornerB = map.latLngToContainerPoint(L.latLng(blockBounds[1][0], blockBounds[1][1]));
      const dispW = Math.max(60, Math.round(Math.abs(cornerB.x - cornerA.x) * 1.15));
      const dispH = Math.round(dispW * 1.05);
      const buf = 2;
      const canvasId = 'baseCanvas_' + (idx++);
      L.marker([centerLat,centerLng], {
        icon: L.divIcon({
          className:'',

          iconSize:[dispW, dispH],

        })
      }).addTo(baseLayer);

  function initBase3D(canvasId){
    const canvas = document.getElementById(canvasId);
    if(!canvas || !window.THREE) return;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, canvas.width/canvas.height, 0.1, 100);
    camera.position.set(3.1, 4.1, 3.9);
    camera.lookAt(0, 1.0, 0);
    const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
    renderer.setSize(canvas.width, canvas.height, false);

    scene.add(new THREE.AmbientLight(0x9099aa, 0.75));
    const key = new THREE.DirectionalLight(0xffffff, 1.2);
    key.position.set(3, 5, 4);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0xF5B93F, 0.5);
    rim.position.set(-4, 2, -3);
    scene.add(rim);

    function mat(c,r,e){ const o={color:c, roughness:r||0.6, metalness:0.1, flatShading:true}; if(e){o.emissive=e; o.emissiveIntensity=0.6;} return new THREE.MeshStandardMaterial(o); }
    const metal = mat(0xaab2c0,0.5);
    const panelC = mat(0xd7dee8,0.6);
    const dark = mat(0x30363f,0.5);
    const glassC = mat(0x0c3d3b,0.2,0x1fb8ad);
    const gold = mat(0xC7CFDA,0.35);

    const base = new THREE.Group();

    const platform = new THREE.Mesh(new THREE.CylinderGeometry(1.9,2.1,0.3,8), metal);
    platform.position.y = 0.15;
    base.add(platform);

    const ring = new THREE.Mesh(new THREE.CylinderGeometry(1.95,1.95,0.08,8), gold);
    ring.position.y = 0.32;
    base.add(ring);

    const domeBase = new THREE.Mesh(new THREE.CylinderGeometry(1.1,1.1,0.3,8), panelC);
    domeBase.position.y = 0.5;
    base.add(domeBase);

    const dome = new THREE.Mesh(new THREE.IcosahedronGeometry(1.05,1), panelC);
    dome.position.y = 1.0;
    dome.scale.set(1,0.8,1);
    base.add(dome);

    for(let w=0; w<3; w++){
      const win = new THREE.Mesh(new THREE.IcosahedronGeometry(0.14,0), glassC);
      const ang = w*(Math.PI*2/3) + 0.4;
      win.position.set(Math.cos(ang)*1.0, 0.95, Math.sin(ang)*1.0);
      base.add(win);
    }

    const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.06,0.7,6), dark);
    mast.position.y = 0.35;

    // Plato parabólico: casquete esférico poco profundo, orientado hacia arriba/afuera
    const dishMat = mat(0xe6eaf0, 0.5);
    dishMat.side = THREE.DoubleSide;
    const dish = new THREE.Mesh(new THREE.SphereGeometry(0.38, 12, 8, 0, Math.PI*2, 0, Math.PI*0.42), dishMat);
    const dishCenter = new THREE.Vector3(0, 0.78, 0);
    dish.position.copy(dishCenter);
    dish.rotation.x = -Math.PI * 0.62; // inclina el plato para que "apunte" hacia afuera

    // Punto focal calculado geométricamente frente al lado cóncavo del plato
    const concaveNormal = new THREE.Vector3(0,-1,0).applyAxisAngle(new THREE.Vector3(1,0,0), dish.rotation.x);
    const focalPoint = dishCenter.clone().add(concaveNormal.clone().multiplyScalar(0.35));
    const dirToDish = dishCenter.clone().sub(focalPoint).normalize();
    const feedQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), dirToDish);

    // Bocina (feed horn) en el punto focal, sostenida por un brazo delgado — ambos "mirando" al plato
    const feedHorn = new THREE.Mesh(new THREE.ConeGeometry(0.06,0.16,8), dark);
    feedHorn.position.copy(focalPoint);
    feedHorn.quaternion.copy(feedQuat);

    const feedArm = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.3,5), dark);
    feedArm.position.copy(focalPoint.clone().lerp(dishCenter, 0.5));
    feedArm.quaternion.copy(feedQuat);

    // Soporte que conecta el plato al mástil
    const bracket = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,0.18,6), dark);
    bracket.position.set(0, 0.72, -0.05);
    bracket.rotation.x = -0.6;

    const antennaGroup = new THREE.Group();
    antennaGroup.add(mast, dish, feedArm, feedHorn, bracket);
    antennaGroup.position.y = 1.95;
    base.add(antennaGroup);

    // Ondas de señal emitidas desde la bocina, orientadas hacia afuera (misma dirección que la bocina)
    const waveMat = new THREE.MeshBasicMaterial({color:0x29E6E0, transparent:true, opacity:0.6, side:THREE.DoubleSide, depthWrite:false});
    const waveRings = [];
    const ringQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1), dirToDish.clone().negate());
    for(let w=0; w<3; w++){
      const ring = new THREE.Mesh(new THREE.RingGeometry(0.08,0.13,20), waveMat.clone());
      ring.position.copy(focalPoint);
      ring.quaternion.copy(ringQuat);
      antennaGroup.add(ring);
      waveRings.push({ mesh: ring, phase: w/3 });
    }


    [-1,1].forEach(side=>{
      const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,1.1,6), dark);
      pole.position.set(side*1.7, 0.85, -0.3);
      pole.rotation.z = side*0.15;
      base.add(pole);
      const panel = new THREE.Mesh(new THREE.BoxGeometry(1.1,0.06,0.7), new THREE.MeshStandardMaterial({color:0x1c3a5e, roughness:0.3, metalness:0.4, flatShading:true, emissive:0x0b3a66, emissiveIntensity:0.3}));
      panel.position.set(side*1.7, 1.35, -0.3);
      panel.rotation.x = -0.5;
      panel.rotation.z = side*0.1;
      base.add(panel);
    });

    const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.55,0.12), dark);
    doorFrame.position.set(0,0.55,1.08);
    base.add(doorFrame);
    const doorGlass = new THREE.Mesh(new THREE.BoxGeometry(0.36,0.42,0.05), glassC);
    doorGlass.position.set(0,0.55,1.15);
    base.add(doorGlass);

    scene.add(base);

    let waveClock = 0;
    function animate(){
      const raf = requestAnimationFrame(animate);
      if(baseRenderers[canvasId]) baseRenderers[canvasId].raf = raf;
      antennaGroup.rotation.y += 0.04;

      waveClock += 0.016;
      const WAVE_DURATION = 1.6;
      waveRings.forEach(w=>{
        const t = ((waveClock/WAVE_DURATION) + w.phase) % 1;
        const scale = 0.4 + t*3.2;
        w.mesh.scale.set(scale, scale, scale);
        w.mesh.material.opacity = 0.55 * (1 - t);
      });

      renderer.render(scene, camera);
    }
    const raf0 = requestAnimationFrame(animate);
    baseRenderers[canvasId] = { renderer, raf: raf0 };
  }

  function randomPointInBounds(){
    const b = map.getBounds();
    const lat = b.getSouth() + Math.random()*(b.getNorth()-b.getSouth());
    const lng = b.getWest() + Math.random()*(b.getEast()-b.getWest());
    return {lat,lng};
  }

  function spawnDiamond(){
    if(!state.userPos) return;
    let pos, tries = 0;
    do{ pos = randomPointInBounds(); tries++; }
    while(distMeters(state.userPos,pos) < ACTION_RADIUS_M && tries < 12);
    const id = 'd_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    const icon = L.divIcon({ className:'diamond-icon', html:'<div class="gem-wrap"><div class="gem-body"></div><div class="gem-shadow"></div></div>', iconSize:[34,44], iconAnchor:[17,44] });
    const marker = L.marker([pos.lat,pos.lng], {icon}).addTo(diamondLayer);
    marker.on('click', ()=> tryCollect(id));
    state.diamonds.set(id, { marker, lat:pos.lat, lng:pos.lng });
  }

  function currentDiamondTarget(){
    return Math.floor(DIAMOND_MIN + Math.random()*(DIAMOND_MAX-DIAMOND_MIN+1));
  }
  let diamondTarget = currentDiamondTarget();

  function ensureDiamonds(){
    if(state.diamonds.size === 0) diamondTarget = currentDiamondTarget();
    while(state.diamonds.size < diamondTarget) spawnDiamond();
  }

  function tryCollect(id){
    const d = state.diamonds.get(id);
    if(!d || !state.userPos) return;
    const dist = distMeters(state.userPos, d);
    if(dist > COLLECT_RADIUS_M){ toast('Muy lejos — acércate ('+Math.round(dist)+'m)','warn'); return; }
    diamondLayer.removeLayer(d.marker);
    state.diamonds.delete(id);
    state.gems += 1;
    state.coins += DIAMOND_REWARD_COINS;
    updateHUD();
    saveProgress();
    toast('+1 💎  +'+DIAMOND_REWARD_COINS+' 🪙','gold');
  }

  const geoStatus = document.getElementById('geoStatus');

  const GPS_MAX_ACCURACY = 30; // metros: ignora lecturas peores que esto (salvo la primera)
  const POS_SMOOTH_ALPHA = 0.35; // cuánto pesa la nueva lectura vs la posición suavizada anterior
  let animGen = 0;

  function lerp(a,b,t){ return a + (b-a)*t; }

  function animateMarkerTo(lat,lng){
    const from = meMarker.getLatLng();
    const to = L.latLng(lat,lng);
    const myGen = ++animGen;
    const start = performance.now();
    const DURATION = 450;
    function step(now){
      if(myGen !== animGen) return; // una animación más nueva la reemplazó
      const t = Math.min(1, (now-start)/DURATION);
      const clat = lerp(from.lat, to.lat, t);
      const clng = lerp(from.lng, to.lng, t);
      meMarker.setLatLng([clat,clng]);
      if(actionCircle) actionCircle.setLatLng([clat,clng]);
      if(t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function onPosition(pos){
    const rawLat = pos.coords.latitude, rawLng = pos.coords.longitude;
    const accuracy = pos.coords.accuracy || 0;

    // Ignora lecturas GPS muy imprecisas una vez que ya tenemos una posición inicial
    if(state.ready && accuracy > GPS_MAX_ACCURACY) return;

    let lat = rawLat, lng = rawLng;
    if(state.userPos){
      lat = lerp(state.userPos.lat, rawLat, POS_SMOOTH_ALPHA);
      lng = lerp(state.userPos.lng, rawLng, POS_SMOOTH_ALPHA);
    }
    state.userPos = {lat,lng};

    if(!state.ready){
      const step = metersToStep(lat);
      state.latStep = step.latStep;
      state.lngStep = step.lngStep;
      state.ready = true;
      lockZoomForUser(lat);
      setViewTilted([lat,lng], FIXED_ZOOM);
      geoStatus.textContent = 'Ubicación activa';
      geoStatus.className = 'status ready';
      renderGrid();
      renderBases();
      refreshBaseAvailability();
      ensureDiamonds();
      setInterval(ensureDiamonds, 4000);
    }

    if(!meMarker){
      meMarker = L.marker([lat,lng], { icon: L.divIcon({className:'', html:'<div class="user-wrap"><canvas id="astroCanvas" width="88" height="136"></canvas><div class="user-shadow"></div></div>', iconSize:[44,76], iconAnchor:[22,76]}) }).addTo(map);
      actionCircle = L.circle([lat,lng], {
        radius: ACTION_RADIUS_M, color:'#29E6E0', weight:1.5, dashArray:'4 6',
        fillColor:'#29E6E0', fillOpacity:0.05
      }).addTo(map);
      setTimeout(initAstronaut3D, 0);
    } else {
      animateMarkerTo(lat,lng);
      const now = performance.now();
      if(!window._lastFollowAt || now - window._lastFollowAt > 800){
        window._lastFollowAt = now;
        setViewTilted([lat,lng], FIXED_ZOOM, true);
      }
    }

    if(lastPos){
      const moved = distMeters(lastPos, {lat,lng});
      const gpsHeading = pos.coords.heading;
      if(gpsHeading !== null && gpsHeading !== undefined && !isNaN(gpsHeading) && (pos.coords.speed || 0) > 0.25){
        heading = gpsHeading; // más preciso: viene directo del chip GPS
      } else if(moved > 0.5 && moved < 100){
        heading = bearingDeg(lastPos, {lat,lng});
      }
      if(moved > 0.6){
        if(window._astroSetMoving) window._astroSetMoving(true);
        clearTimeout(window._movingResetTimer);
        window._movingResetTimer = setTimeout(()=>{
          if(window._astroSetMoving) window._astroSetMoving(false);
        }, 1500);
      }
      lastPos = {lat,lng};
    } else {
      lastPos = {lat,lng};
    }
    if(window._astroSetHeading) window._astroSetHeading(heading);

    renderGrid();
  }

  function initAstronaut3D(){
    const canvas = meMarker.getElement() && meMarker.getElement().querySelector('#astroCanvas');
    if(!canvas || !window.THREE) return;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, canvas.width/canvas.height, 0.1, 100);
    camera.position.set(0, 0.55, 7.2);
    camera.lookAt(0, 0.55, 0);
    const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
    renderer.setSize(canvas.width, canvas.height, false);

    scene.add(new THREE.AmbientLight(0x9099aa, 0.75));
    const key = new THREE.DirectionalLight(0xffffff, 1.2);
    key.position.set(3, 5, 4);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0x66e0d8, 0.5);
    rim.position.set(-4, 2, -3);
    scene.add(rim);

    const astro = new THREE.Group();
    function mat(c,r){ return new THREE.MeshStandardMaterial({color:c, roughness:r||0.65, metalness:0.05, flatShading:true}); }
    const suit = mat(0xd7dee8);
    const dark = mat(0x30363f,0.5);
    const white = mat(0xeef1f5,0.55);
    const visorMat = new THREE.MeshStandardMaterial({color:0x0c3d3b, roughness:0.2, metalness:0.5, emissive:0x0d5b56, emissiveIntensity:0.4, flatShading:true});
    const pack = mat(0x8fa0ba,0.7);

    const backpack = new THREE.Mesh(new THREE.BoxGeometry(1.0,1.2,0.45), pack);
    backpack.position.set(0,0.6,-0.5);
    astro.add(backpack);

    const profile = [
      new THREE.Vector2(0.36,-0.35), new THREE.Vector2(0.5,-0.05), new THREE.Vector2(0.6,0.35),
      new THREE.Vector2(0.58,0.75), new THREE.Vector2(0.48,1.05), new THREE.Vector2(0.32,1.28)
    ];
    astro.add(new THREE.Mesh(new THREE.LatheGeometry(profile,7), suit));

    const chest = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.4,0.08), white);
    chest.position.set(0,0.7,0.6);
    astro.add(chest);
    const b1 = new THREE.Mesh(new THREE.IcosahedronGeometry(0.06,0), new THREE.MeshStandardMaterial({color:0xd8453f, flatShading:true}));
    b1.position.set(-0.14,0.73,0.65); astro.add(b1);
    const b2 = new THREE.Mesh(new THREE.IcosahedronGeometry(0.06,0), new THREE.MeshStandardMaterial({color:0x3f7fd8, flatShading:true}));
    b2.position.set(0.05,0.73,0.65); astro.add(b2);

    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.32,0.2,6), pack);
    neck.position.set(0,1.38,0);
    astro.add(neck);

    const helmet = new THREE.Mesh(new THREE.IcosahedronGeometry(0.72,1), white);
    helmet.position.set(0,1.86,0);
    astro.add(helmet);

    const visorMesh = new THREE.Mesh(new THREE.IcosahedronGeometry(0.55,1), visorMat);
    visorMesh.scale.set(1,0.85,0.55);
    visorMesh.position.set(0,1.84,0.4);
    astro.add(visorMesh);

    const legGroups = { left:null, right:null };

    [-1,1].forEach(side=>{
      const shoulder = new THREE.Mesh(new THREE.IcosahedronGeometry(0.24,0), suit);
      shoulder.position.set(side*0.6,0.95,0);
      astro.add(shoulder);
      const upperArm = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.16,0.65,6), suit);
      upperArm.position.set(side*0.72,0.6,0.05);
      upperArm.rotation.z = side*0.35;
      astro.add(upperArm);
      const elbow = new THREE.Mesh(new THREE.IcosahedronGeometry(0.15,0), suit);
      elbow.position.set(side*0.85,0.28,0.12);
      astro.add(elbow);
      const lowerArm = new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.13,0.55,6), suit);
      lowerArm.position.set(side*0.88,-0.02,0.18);
      lowerArm.rotation.z = side*0.12;
      astro.add(lowerArm);
      const glove = new THREE.Mesh(new THREE.IcosahedronGeometry(0.19,0), dark);
      glove.position.set(side*0.9,-0.3,0.22);
      astro.add(glove);

      // Grupo de pierna con pivote en la cadera, para poder animar el paso
      const legGroup = new THREE.Group();
      legGroup.position.set(side*0.3, -0.4, 0);
      const hip = new THREE.Mesh(new THREE.IcosahedronGeometry(0.24,0), suit);
      hip.position.set(side*-0.02, 0, 0);
      legGroup.add(hip);
      const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.23,0.17,1.0,6), suit);
      leg.position.set(0, -0.55, 0);
      legGroup.add(leg);
      const boot = new THREE.Mesh(new THREE.BoxGeometry(0.38,0.26,0.6), dark);
      boot.position.set(0, -1.1, 0.1);
      legGroup.add(boot);
      astro.add(legGroup);
      if(side === -1) legGroups.left = legGroup; else legGroups.right = legGroup;
    });

    scene.add(astro);

    let targetRotY = 0;
    window._astroSetHeading = (deg)=>{ targetRotY = deg * Math.PI/180; };

    let walking = false;
    window._astroSetMoving = (m)=>{ walking = m; };
    let walkPhase = 0;

    function animate(){
      requestAnimationFrame(animate);
      let diff = targetRotY - astro.rotation.y;
      diff = ((diff + Math.PI) % (2*Math.PI)) - Math.PI; // camino más corto
      astro.rotation.y += diff * 0.12;

      if(walking){
        walkPhase += 0.2;
        const swing = Math.sin(walkPhase) * 0.55;
        legGroups.left.rotation.x = swing;
        legGroups.right.rotation.x = -swing;
      } else {
        legGroups.left.rotation.x *= 0.85;
        legGroups.right.rotation.x *= 0.85;
      }

      renderer.render(scene, camera);
    }
    animate();
  }

        document.exitFullscreen();
      }
    }catch(e){ toast('Tu navegador no permite pantalla completa aquí','warn'); }
  });

  document.getElementById('compassBtn').addEventListener('click', ()=>{
    if(map.setBearing) map.setBearing(0);
  });

  // ---------- PERFIL: NOMBRE Y FOTO ----------
  const avatarEl = document.getElementById('avatar');
  const avatarInput = document.getElementById('avatarInput');
  const nameEl = document.getElementById('userName');

  function initialsOf(name){
    const parts = (name || '').trim().split(/\s+/).filter(Boolean);
    if(parts.length === 0) return 'JD';
    return parts.slice(0,2).map(w=>w[0].toUpperCase()).join('');
  }

  function applyProfile(){
    nameEl.textContent = state.username;
    if(state.avatarData){
      avatarEl.style.backgroundImage = 'url(' + state.avatarData + ')';
      avatarEl.textContent = '';
    } else {
      avatarEl.style.backgroundImage = '';
      avatarEl.textContent = initialsOf(state.username);
    }
  }

  avatarEl.addEventListener('click', ()=> avatarInput.click());
  avatarInput.addEventListener('change', (e)=>{
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    if(file.size > 2*1024*1024){ toast('La imagen es muy pesada (máx 2MB)','warn'); return; }
    const reader = new FileReader();
    reader.onload = ()=>{
      state.avatarData = reader.result;
      applyProfile();
      saveProgress();
      toast('Foto de perfil actualizada','ok');
    };
    reader.readAsDataURL(file);
  });

  nameEl.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ e.preventDefault(); nameEl.blur(); }
  });
  nameEl.addEventListener('blur', ()=>{
    const val = nameEl.textContent.trim().slice(0,20) || 'Jugador';
    state.username = val;
    applyProfile();
    saveProgress();
  });

  applyProfile();

  updateHUD();
})();
</script>
</body>
</html>
